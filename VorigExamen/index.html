<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groepschat</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="chat-container">
        <h1>Versie B</h1>
        <label for="message-sender">Profiel</label>
        <select id="message-sender">
          <option value="Jeroen">Jeroen</option>
          <option value="Leila">Leila</option>
          <option value="Alex">Alex</option>
          <option value="Aisha">Aisha</option>
        </select>
        <div class="chat-box" id="chat-box"></div>
        <label for="message-input">Bericht</label>
        <input type="text" id="message-input" placeholder="Typ een bericht...">
        <button id="send-button">Verstuur</button>
		    <button id="clear-all">Wissen</button>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
