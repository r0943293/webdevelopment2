<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Internet Start Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">


    <h1>My Internet Start Page</h1>

    <label for="commandInput" class="form-label">Zoekopdracht</label>
    <input
            type="text"
            id="commandInput"
            class="form-control"
            placeholder="Enter commando"
    >
    <div class="form-text">Start your commando with "/[character] [zoekopdracht]"</div>

    <button id="goBtn" class="btn btn-success">GO!</button>

    <hr class="my-4">


    <h2>History</h2>
    <div id="historyContainer" class="row g-3">

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts/index.js"></script>

</body>
</html>
